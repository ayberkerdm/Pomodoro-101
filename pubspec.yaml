name: pomodoro
description: A comprehensive, modern Pomodoro productivity app built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # === State Management ===
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # === Navigation ===
  go_router: ^13.2.4

  # === Local Database ===
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # === Persistent Simple Storage ===
  shared_preferences: ^2.2.3

  # === Notifications ===
  flutter_local_notifications: ^17.2.4

  # === Audio ===
  just_audio: ^0.9.40

  # === Vibration ===
  vibration: ^3.1.8

  # === Charts ===
  fl_chart: ^0.68.0

  # === Animations ===
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # === Typography ===
  google_fonts: ^6.2.1

  # === Utilities ===
  uuid: ^4.3.3
  intl: ^0.19.0
  wakelock_plus: ^1.2.5
  permission_handler: ^11.3.1
  path_provider: ^2.1.3

  # === Immutable Models ===
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # === Code Generation ===
  build_runner: ^2.4.13
  freezed: ^2.4.7
  # isar_generator is pinned to analyzer <6.0 which conflicts with riverpod_generator
  # We use isar manually without generator for now
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.10
  json_serializable: ^6.8.0

  # === App Icon Generation ===
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/animations/
    - assets/images/
